services:
  postgres:
    image: postgres:16-alpine
    container_name: jsvs-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: jsvs
      POSTGRES_PASSWORD: jsvs_dev_password
      POSTGRES_DB: jsvs
    volumes:
      - jsvs_pgdata:/var/lib/postgresql/data

volumes:
  jsvs_pgdata:
